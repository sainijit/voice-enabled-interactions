# docker-compose.yml
#
# Starts kiosk-core (API) and kiosk-ui (Gradio browser interface).
# Mic audio is captured by the browser via Web Audio API and uploaded as a
# file — no host mic passthrough into the container is required.
#
# The three downstream services (audio-analyzer :8010, TTS :8011, RAG :8020)
# must be running on the host before starting this stack.
#
# Start:   docker compose up -d --build
# Stop:    docker compose down
# Logs:    docker compose logs -f

services:
  kiosk-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kiosk-core
    ports:
      - "8012:8012"
    environment:
      KIOSK_CORE_ANALYZER_URL: http://host.docker.internal:8010/v1/audio/transcriptions
      KIOSK_CORE_RAG_URL:      http://host.docker.internal:8020/api/v1/query
      KIOSK_CORE_TTS_URL:      http://host.docker.internal:8011/v1/audio/speech
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./generated_audio:/app/generated_audio
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8012/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  kiosk-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kiosk-ui
    ports:
      - "7860:7860"
    environment:
      KIOSK_CORE_UI_BASE_URL:     http://kiosk-core:8012
      KIOSK_CORE_UI_ANALYZER_URL: http://host.docker.internal:8010/v1/audio/transcriptions
      KIOSK_CORE_UI_RAG_URL:      http://host.docker.internal:8020/api/v1/query
      KIOSK_CORE_UI_TTS_URL:      http://host.docker.internal:8011/v1/audio/speech
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./generated_audio:/app/generated_audio
    command: ["python3", "gradio_app.py"]
    depends_on:
      kiosk-core:
        condition: service_healthy
    restart: unless-stopped
