name: "[Smart Kiosk] Functional Tests"
run-name: "[Smart Kiosk] Functional Tests (by @${{ github.actor }} via ${{ github.event_name }})"

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
on:
  pull_request:
    branches:
      - main
    paths:
      - "smart-kiosk-assistant/**"
      - ".github/workflows/kiosk-functional-tests.yml"
  push:
    branches:
      - main
    paths:
      - "smart-kiosk-assistant/**"
      - ".github/workflows/kiosk-functional-tests.yml"
  workflow_dispatch:
    inputs:
      enable_tier2:
        description: "Run Tier 2 Docker tests (default: false for forks)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

# Cancel any in-progress run for the same PR; unlimited for branch pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Minimal default permissions; jobs override where needed
permissions:
  contents: read

defaults:
  run:
    working-directory: smart-kiosk-assistant

# ---------------------------------------------------------------------------
# TIER 1 — CI-safe functional tests
# Covers: NEX-T24243, NEX-T24244, NEX-T24260, NEX-T24251,
#         NEX-T24266, NEX-T24256 + defensive edge cases
# No Docker, no ML models, no audio hardware required.
# Runs on every PR and push.
# ---------------------------------------------------------------------------
jobs:
  tier1-functional-tests:
    name: "Tier 1 — CI-safe functional tests"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: smart-kiosk-assistant/requirements.txt

      - name: Install system dependencies
        # libportaudio2 is required by sounddevice at import time even when
        # no real microphone is present (matches the project Dockerfile).
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libportaudio2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install \
            pytest==8.3.5 \
            pytest-timeout==2.3.1 \
            pyyaml

      - name: Run Tier 1 functional tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests/functional/ \
            -m "tier1" \
            --tb=short \
            --strict-markers \
            -v \
            --timeout=60 \
            --junitxml=test-results/tier1-results.xml

      - name: Upload Tier 1 test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: tier1-functional-test-results
          path: |
            smart-kiosk-assistant/test-results/tier1-results.xml
            smart-kiosk-assistant/tests/functional/test_results.csv
          retention-days: 30

  # ---------------------------------------------------------------------------
  # TIER 2 — Docker-required tests
  # Covers: NEX-T24245, NEX-T24246, NEX-T24247, NEX-T24248, NEX-T24261
  # Builds and runs kiosk-core container only (no ML model downloads).
  # Runs on push to main or when ENABLE_TIER2_TESTS variable is set to 'true',
  # or manually via workflow_dispatch with enable_tier2=true.
  # Skipped on forks where secrets/variables may be unavailable.
  # ---------------------------------------------------------------------------
  tier2-docker-tests:
    name: "Tier 2 — Docker container tests"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.enable_tier2 == 'true') ||
      vars.ENABLE_TIER2_TESTS == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: smart-kiosk-assistant/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libportaudio2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install \
            pytest==8.3.5 \
            pytest-timeout==2.3.1 \
            pyyaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Run Tier 2 Docker tests
        env:
          PYTHONPATH: .
        timeout-minutes: 20
        run: |
          python -m pytest tests/functional/ \
            -m "tier2" \
            --tb=short \
            --strict-markers \
            -v \
            --timeout=900 \
            --junitxml=test-results/tier2-results.xml

      - name: Upload Tier 2 test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: tier2-docker-test-results
          path: |
            smart-kiosk-assistant/test-results/tier2-results.xml
            smart-kiosk-assistant/tests/functional/test_results.csv
          retention-days: 30

      - name: Docker cleanup
        if: always()
        run: |
          docker rm -f kiosk-core-ci-test 2>/dev/null || true
          docker rmi -f kiosk-core-ci-test:latest 2>/dev/null || true
