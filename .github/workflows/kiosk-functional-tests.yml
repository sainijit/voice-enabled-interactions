name: "[Smart Kiosk] Functional Tests"
run-name: "[Smart Kiosk] Functional Tests (by @${{ github.actor }} via ${{ github.event_name }})"

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
on:
  pull_request:
    branches:
      - main
    paths:
      - "smart-kiosk-assistant/**"
      - ".github/workflows/kiosk-functional-tests.yml"
  push:
    paths:
      - "smart-kiosk-assistant/**"
      - ".github/workflows/kiosk-functional-tests.yml"
  workflow_dispatch:
    inputs:
      run_full_stack:
        description: "Run Tier 2 full-stack tests (make up + agent chat)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

# Cancel any in-progress run for the same PR; last push wins for branch pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

# Minimal default permissions; jobs override where needed
permissions:
  contents: read

defaults:
  run:
    working-directory: smart-kiosk-assistant

# ---------------------------------------------------------------------------
# TIER 1 — CI-safe functional tests
# Covers TC #1, #2, #4, #6, #7 from functional-test-cases-sheet.md
# No Docker, no ML models, no audio hardware required.
# Runs on every push and PR.
# ---------------------------------------------------------------------------
jobs:
  tier1-functional-tests:
    name: "Tier 1 — CI-safe functional tests"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: smart-kiosk-assistant/requirements.txt

      - name: Install system dependencies
        # libportaudio2 is required by sounddevice at import time even when
        # no real microphone is present (matches the project Dockerfile).
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libportaudio2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install \
            pytest==8.3.5 \
            pytest-timeout==2.3.1 \
            pyyaml \
            requests

      - name: Run Tier 1 functional tests
        env:
          PYTHONPATH: .
          # Ensure diarization is off so HF_TOKEN is not required at import time
          KIOSK_CORE_DIARIZATION_ENABLED: "false"
        run: |
          python -m pytest tests/functional/ \
            -m "tier1" \
            --tb=short \
            --strict-markers \
            -v \
            --timeout=60 \
            --junitxml=test-results/tier1-results.xml

      - name: Upload Tier 1 test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: tier1-functional-test-results
          path: |
            smart-kiosk-assistant/test-results/tier1-results.xml
            smart-kiosk-assistant/tests/functional/test_results.csv
          retention-days: 30

  # ---------------------------------------------------------------------------
  # TIER 2 — Build, deploy & full-stack integration tests
  # Covers TC #5 and TC #8–#13 from functional-test-cases-sheet.md:
  #   #5  Docker build tests (all images present after `make build`)
  #   #8  Health checks for all services
  #   #9  CPU metrics via metrics-collector
  #   #10 RAG ingestion and retrieval
  #   #11 Product menu (26 items)
  #   #12 Agent ordering flow (text-mode, no audio)
  #   #13 End-to-end latency within bounds
  #
  # Single job: builds all images once, verifies them, then starts the full
  # stack against those same images and runs the full-stack tests. Previously
  # split into Tier 2A (build-only) and Tier 2B (full-stack) — merged because
  # Tier 2B already has to build the images itself, making Tier 2A's build
  # redundant.
  #
  # Runs on push to main branch or when manually triggered with run_full_stack=true.
  # Requires ~6 GB disk for models + Docker images.
  # Uses KIOSK_CORE_DIARIZATION_ENABLED=false so HF_TOKEN is NOT required.
  # ---------------------------------------------------------------------------
  tier2-build-and-full-stack-tests:
    name: "Tier 2 — Build & full-stack integration tests"
    runs-on: ubuntu-latest
    needs: tier1-functional-tests

    permissions:
      contents: read

    # Only run on push to main or manual trigger with run_full_stack=true
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_full_stack == 'true')

    env:
      RELEASE_TAG: "2026.1.0"
      TARGET_DEVICE: "CPU"
      RENDER_GID: "109"
      # Disable speaker diarization — avoids gated HF model download in CI
      KIOSK_CORE_DIARIZATION_ENABLED: "false"
      # Increase timeouts for CPU inference on GH-hosted runner
      STACK_STARTUP_TIMEOUT: "600"
      LLM_RESPONSE_TIMEOUT: "300"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: smart-kiosk-assistant/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest==8.3.5 \
            pytest-timeout==2.3.1 \
            pyyaml \
            pydantic==2.11.7 \
            requests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      # Cache Docker layer builds so repeated pushes don't rebuild from scratch.
      # Key includes the hash of all Dockerfiles and requirement files.
      - name: Cache Docker image layers
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /tmp/docker-cache
          key: ${{ runner.os }}-docker-build-${{ hashFiles('smart-kiosk-assistant/**/Dockerfile', 'smart-kiosk-assistant/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-docker-build-

      # Cache downloaded ML models between runs.
      # Key: hash of setup_models.sh — any change to downloads busts the cache.
      - name: Cache ML models
        id: cache-models
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            smart-kiosk-assistant/models
            smart-kiosk-assistant/storage
          key: ${{ runner.os }}-models-${{ hashFiles('smart-kiosk-assistant/setup_models.sh') }}
          restore-keys: |
            ${{ runner.os }}-models-

      - name: Download ML models (if cache miss)
        if: steps.cache-models.outputs.cache-hit != 'true'
        timeout-minutes: 30
        run: |
          chmod +x setup_models.sh
          # CPU device, INT8 Qwen3-4B, skip identity models not needed for kiosk tests
          ./setup_models.sh --device CPU --skip-identity 2>&1 | tee /tmp/model-download.log
        env:
          # HF_TOKEN is not required for Qwen3-4B (public model)
          # It would be required for Pyannote but diarization is disabled in CI
          HF_TOKEN: ""

      - name: Create CI .env
        # TARGET_DEVICE must be overridden here (not just via step env) because
        # the Makefile does `-include .env`, so .env.example's TARGET_DEVICE=GPU
        # default would otherwise win over the job-level TARGET_DEVICE=CPU env.
        run: |
          cp .env.example .env
          echo "KIOSK_CORE_DIARIZATION_ENABLED=false" >> .env
          echo "TARGET_DEVICE=CPU" >> .env

      - name: Build all service images
        timeout-minutes: 30
        run: |
          make build REGISTRY=false KIOSK_CORE_DIARIZATION_ENABLED=false

      - name: Run Tier 2 build tests
        # Verifies all expected images are present (TC #5) before starting the stack.
        env:
          PYTHONPATH: .
          RELEASE_TAG: "2026.1.0"
        timeout-minutes: 5
        run: |
          python -m pytest tests/functional/test_make_build.py \
            -m "tier2" \
            --tb=short \
            --strict-markers \
            -v \
            --timeout=60 \
            --junitxml=test-results/tier2-build-results.xml

      - name: Upload Tier 2 build test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: tier2-build-test-results
          path: |
            smart-kiosk-assistant/test-results/tier2-build-results.xml
            smart-kiosk-assistant/tests/functional/test_results.csv
          retention-days: 30

      - name: Start all services (diarization disabled)
        timeout-minutes: 5
        run: |
          # Start the full stack with diarization disabled
          KIOSK_CORE_DIARIZATION_ENABLED=false make up
        env:
          KIOSK_CORE_DIARIZATION_ENABLED: "false"
          TARGET_DEVICE: "CPU"

      - name: Wait for core services to become healthy
        timeout-minutes: 10
        run: |
          echo "Waiting for kiosk-core to be healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8012/health > /dev/null 2>&1; then
              echo "kiosk-core is healthy after ${i}0s"
              break
            fi
            echo "Attempt $i/60 — waiting 10s..."
            sleep 10
          done

          echo "Waiting for rag-service to be healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8020/health > /dev/null 2>&1; then
              echo "rag-service is healthy after ${i}0s"
              break
            fi
            echo "Attempt $i/60 — waiting 10s..."
            sleep 10
          done

      - name: Show service logs (pre-test snapshot)
        if: always()
        run: |
          docker compose logs --tail=50 kiosk-core rag-service metrics-collector 2>/dev/null || true

      - name: Run Tier 2 full-stack tests
        env:
          PYTHONPATH: .
          STACK_STARTUP_TIMEOUT: "600"
          LLM_RESPONSE_TIMEOUT: "300"
        timeout-minutes: 60
        run: |
          python -m pytest tests/functional/test_full_stack.py \
            -m "tier2" \
            --tb=short \
            --strict-markers \
            -v \
            --timeout=360 \
            --junitxml=test-results/tier2-stack-results.xml

      - name: Show service logs (post-test)
        if: always()
        run: |
          docker compose logs --tail=100 2>/dev/null || true

      - name: Upload Tier 2 full-stack test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: tier2-full-stack-test-results
          path: |
            smart-kiosk-assistant/test-results/tier2-stack-results.xml
            smart-kiosk-assistant/tests/functional/test_results.csv
          retention-days: 30

      - name: Tear down all services
        if: always()
        run: |
          make down 2>/dev/null || docker compose down --remove-orphans --volumes 2>/dev/null || true
          docker image prune -f 2>/dev/null || true
